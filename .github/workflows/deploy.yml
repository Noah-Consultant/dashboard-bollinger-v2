# ─── GitHub Pages Deployment Workflow ────────────────────────────────────────
# Règles E.9, E.10, E.11 du prompt de spécifications v2.1
#
# E.9  — Workflow CI/CD GitHub Actions OBLIGATOIRE
# E.10 — vite.config.ts base: "/dashboard-bollinger-v2/" en production
# E.11 — 404.html = copie de index.html pour SPA routing (Wouter base)
#
# Déclenchement: push sur main + workflow_dispatch
# Artifact: dist/ (Vite build outDir)
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permissions requises pour GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Vite App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for GitHub Pages
        run: pnpm run build
        env:
          NODE_ENV: production
          # Vite lit NODE_ENV=production → base = "/dashboard-bollinger-v2/"
          VITE_ANALYTICS_ENDPOINT: ""
          VITE_ANALYTICS_WEBSITE_ID: ""

      # E.11 — Copier index.html → 404.html pour SPA routing (Wouter base)
      - name: Create 404.html for SPA routing (E.11)
        run: cp dist/index.html dist/404.html

      # E.11 — Créer .nojekyll pour désactiver le traitement Jekyll
      - name: Create .nojekyll (E.11)
        run: touch dist/.nojekyll

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
